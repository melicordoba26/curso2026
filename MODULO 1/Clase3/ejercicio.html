<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="ejercicio.css">
</head>
<h1>Formulario de contacto</h1>
<h2>Complete los datos según corresponda</h2>
<body>
    <form>
        <label for="nombre">Nombre</label>
        <input type="text" minlength="3" name="nombre" id="nombre" placeholder="Ingrese su nombre"> 

        <label for="apellido">Apellido</label>
        <input type="text" minlength="3" name="apellido" id="apellido" placeholder="Ingrese su apellido"> 

        <label for="edad">Edad</label> 
        <input type="number" min="18" max="100"name="edad" id="edad" placeholder="Ingrese su edad"> 
        <label for="email">Email * </label>
        <input type="email" required name="email" id="email" placeholder="Ingrese su email">

        <label for="telefono">Telefono</label>
        <input type="tel" name="telefono" id="telefono" maxlength="10" placeholder="Ingrese su teléfono">

        <label for="tipocliente">Tipo de cliente</label> 
        <label>Habitual</label>
        <input type="radio" name="tipo" id="tipo">
        <label>No afiliado</label>
        <input type="radio" name="tip" id="tipo">


        <label for="motivo">Motivo de contacto </label>

        
        <select name="motivo" id="motivo">
            <option selected></option>
            <option>Consulta</option>
            <option>Trabajo</option>
        </select> 
        <label for="mensaje">Mensaje</label>
        <textarea name="mensaje" id="mensaje"></textarea> 

        <label for="checkbox">Acepto terminos y condiciones</label> 
        <input type = "checkbox" name="checkbox" id="required"> 



        <button type="submit">Enviar</button>
    </form>
</body>
</html>
