<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formularo de registro</title>
    <link rel="stylesheet" href="tarea.css">
</head>
<h1>¡No te pierdas el gran evento del año!</h1>
<h2>Completá con tus datos</h2>
<body>
    <form>
        <label for="nombre">Nombre</label>
        <input type="text" minlength="3" name="nombre" id="nombre" placeholder="Ingrese su nombre"> 

        <label for="email">Email</label>
        <input type="email"  required name="email" id="email" placeholder="Ingrese su email">

    

        <label for="dia"> ¿Sobre qué día querés info?</label>
        <label>Sábado 28</label>
        <input type="checkbox" name="dia" id="dia">
        <label>Domingo 1</label>
        <input type="checkbox" name="dia" id="dia">

        <button type="submit">Enviar</button >
    
        
    </form>
<footer class="footer">La casa se reserva el derecho de admisión</footer>
</body>
</html>
